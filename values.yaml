# Baseline Tdarr. Override ingress host, persistence (existingClaim), and media mounts in your values.
# Media paths typically align with Plex or other media charts — use existingClaim per library in instantiation.

tdarr:
  controllers:
    main:
      enabled: true
      type: deployment
      containers:
        main:
          image:
            repository: ghcr.io/haveagitgat/tdarr
            tag: latest
            pullPolicy: IfNotPresent
          env:
            TZ: UTC
            serverPort: "8266"
            webUIPort: "8265"
            internalNode: "true"
            inContainer: "true"
            ffmpegVersion: "7"
            PUID: "1000"
            PGID: "1000"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
          probes:
            startup:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 8265
                initialDelaySeconds: 30
                periodSeconds: 10
                timeoutSeconds: 5
                failureThreshold: 30

  service:
    main:
      enabled: true
      type: ClusterIP
      ports:
        http:
          enabled: true
          port: 8265
          primary: true
        api:
          enabled: true
          port: 8266

  ingress:
    main:
      enabled: false

  persistence:
    server:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 5Gi
      storageClass: ""
      globalMounts:
        - path: /app/server
    configs:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 1Gi
      storageClass: ""
      globalMounts:
        - path: /app/configs
    logs:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 1Gi
      storageClass: ""
      globalMounts:
        - path: /app/logs
    cache:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 10Gi
      storageClass: ""
      globalMounts:
        - path: /temp
    # Media mounts: override in instantiation with existingClaim per library path (e.g. same PVCs as Plex).
    media:
      enabled: true
      type: emptyDir
      globalMounts:
        - path: /media

  defaultPodOptions:
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
